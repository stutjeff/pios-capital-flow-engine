name: PIOS Market State Engine V6.6.0

on:
  schedule:
    # 每天台北時間 17:18（UTC 09:18）
    - cron: "18 9 * * *"

  workflow_dispatch:
    inputs:
      rebuild_analog_library:
        description: "重建 2000/2008/2011/2015/2018/2020/2022 歷史類比資料庫"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: pios-market-state-engine-v6-6
  cancel-in-progress: false

jobs:
  capital-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Repository sanity check
        run: |
          python repository_sanity_check.py

      - name: Run tests
        run: |
          python provider_regression_test.py
          pytest -q

      - name: Rebuild historical analog library
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_analog_library == true }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          NYTIMES_API_KEY: ${{ secrets.NYTIMES_API_KEY }}

          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

        run: |
          python build_analog_library.py

      - name: Run PIOS Market State Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          NYTIMES_API_KEY: ${{ secrets.NYTIMES_API_KEY }}

          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

        run: |
          python main.py

      - name: Show concise diagnostics
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import pandas as pd

          source = Path("data/source_status.csv")

          if source.exists():
              df = pd.read_csv(source)

              print("========== Source Status ==========")

              if {"category", "status"}.issubset(df.columns):
                  print(
                      df.groupby(
                          ["category", "status"],
                          dropna=False,
                      )
                      .size()
                      .to_string()
                  )

              if {"market_session", "freshness_state"}.issubset(df.columns):
                  print("\n========== Freshness ==========")
                  print(
                      df.groupby(
                          ["market_session", "freshness_state"],
                          dropna=False,
                      )
                      .size()
                      .to_string()
                  )
          else:
              print("data/source_status.csv not found")

          decision = Path("data/decision.json")

          if decision.exists():
              payload = json.loads(
                  decision.read_text(encoding="utf-8")
              )

              state = payload.get("state_engine", {})
              contagion = payload.get("cross_market_contagion", {})

              print("\n========== Market State ==========")
              print(
                  "state:",
                  state.get("state"),
                  state.get("state_zh"),
              )
              print("risk:", state.get("risk_score"))
              print(
                  "contagion:",
                  contagion.get("stage"),
                  "/",
                  contagion.get("max_stage"),
                  contagion.get("label"),
              )
          else:
              print("data/decision.json not found")
          PY

      - name: Commit generated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只提交 data 資料夾，避免把程式碼、快取或測試暫存檔一起提交
          git add -A data/

          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi

          git commit -m "Update PIOS market state $(date -u +%F-%H%M)"

          # 不再執行 pull/rebase，避免 __pycache__ 或其他未暫存變更阻擋收尾
          git push origin HEAD:main
