name: PIOS Capital Flow Engine V5.3.2 SEC User-Agent

on:
  workflow_dispatch:

  schedule:
    # 台北時間 17:18 = UTC 09:18
    - cron: "18 9 * * *"

permissions:
  contents: write

concurrency:
  group: pios-capital-flow-engine-v5-3-2
  cancel-in-progress: false

jobs:
  capital-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Repository sanity check
        run: |
          python repository_sanity_check.py

      - name: Run regression tests
        run: |
          python provider_regression_test.py
          pytest -q

      - name: Run PIOS Capital Flow Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          NYTIMES_API_KEY: ${{ secrets.NYTIMES_API_KEY }}

          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

        run: |
          python main.py

      - name: Show source diagnostics
        if: always()
        run: |
          if [ -f data/source_status.csv ]; then
            python - <<'PY'
          import pandas as pd

          path = "data/source_status.csv"
          df = pd.read_csv(path)

          print("========== Source Status ==========")

          if {"category", "status"}.issubset(df.columns):
              summary = (
                  df.groupby(
                      ["category", "status"],
                      dropna=False,
                  )
                  .size()
                  .to_string()
              )
              print(summary)
          else:
              print("source_status.csv 欄位不完整")
              print(df.columns.tolist())

          issue_statuses = {
              "ERROR",
              "NETWORK_ERROR",
              "SCHEMA_MISMATCH",
              "INVALID_KEY",
              "MISSING_KEY",
              "MISSING_CONFIGURATION",
              "RATE_LIMIT",
              "PLAN_NOT_SUPPORTED",
              "PERMISSION_DENIED",
              "NO_DATA",
              "UPSTREAM_ERROR",
          }

          if "status" in df.columns:
              issues = df[df["status"].isin(issue_statuses)]

              if not issues.empty:
                  print("\n========== Provider Issues ==========")

                  show_columns = [
                      column
                      for column in [
                          "source",
                          "category",
                          "status",
                          "error_type",
                          "http_code",
                          "detail",
                      ]
                      if column in issues.columns
                  ]

                  print(
                      issues[show_columns]
                      .head(50)
                      .to_string(index=False)
                  )
              else:
                  print("\nNo provider issues.")
          PY
          else
            echo "data/source_status.csv not found"
          fi

      - name: Commit generated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.csv data/*.json data/*.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update capital flow data $(date -u +%F-%H%M)"
            git pull --rebase
            git push
          fi
