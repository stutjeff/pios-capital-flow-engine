name: PIOS Capital Flow Engine V6.5.0

on:
  schedule:
    # 每天台北 17:18 (UTC 09:18)
    - cron: "18 9 * * *"

  workflow_dispatch:
    inputs:
      rebuild_analog_library:
        description: "重建 2000/2008/2011/2015/2018/2020/2022 歷史類比資料庫"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  capital-flow:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Provider Regression
        run: |
          python provider_regression_test.py

      - name: Run PIOS Market State Engine
        env:

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          NOAA_CDO_TOKEN: ${{ secrets.NOAA_CDO_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

          REBUILD_ANALOG_LIBRARY: ${{ github.event.inputs.rebuild_analog_library }}

        run: |
          python main.py

      - name: Commit updated history
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || \
          git commit -m "Update market state history"

          git push
